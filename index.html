<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rae Wilde</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
    <!-- Sun (shown in dark mode) -->
    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>
    <!-- Moon (shown in light mode) -->
    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <div class="container">

    <header>
      <h1 class="name">Rae<br>Wilde<span>.</span></h1>
      <p class="tagline">Developer &amp; Creator</p>
      <hr class="header-rule">
    </header>

    <p class="greeting" id="greeting"></p>

    <section id="about">
      <h2 class="section-heading">About</h2>
      <p class="bio">
        I'm a developer passionate about building clean, user-friendly experiences.
        I enjoy turning ideas into well-crafted products — writing code that is as
        readable as the interfaces it powers.
      </p>
    </section>

    <section id="skills">
      <h2 class="section-heading">Skills</h2>
      <ul class="skills-list">
        <li><span class="skill-dot"></span>HTML &amp; CSS</li>
        <li><span class="skill-dot"></span>JavaScript</li>
        <li><span class="skill-dot"></span>Python</li>
      </ul>
    </section>

    <section id="contact">
      <h2 class="section-heading">Contact</h2>
      <form class="contact-form" action="https://formsubmit.co/raetest@mailinator.com" method="POST">
        <input type="hidden" name="_subject" value="New message from your portfolio">
        <input type="hidden" name="_captcha" value="false">
        <div class="form-group">
          <label for="contact-name">Name</label>
          <input type="text" id="contact-name" name="name" required placeholder="Your name">
        </div>
        <div class="form-group">
          <label for="contact-email">Email</label>
          <input type="email" id="contact-email" name="email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label for="contact-message">Message</label>
          <textarea id="contact-message" name="message" required placeholder="What's on your mind?"></textarea>
        </div>
        <button type="submit" class="form-submit">Send message</button>
      </form>
    </section>

  </div>

  <script>
    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting').textContent = greeting + '.';

    const toggle = document.getElementById('themeToggle');
    const html = document.documentElement;

    // Restore saved preference
    if (localStorage.getItem('theme') === 'dark') {
      html.setAttribute('data-theme', 'dark');
    }

    toggle.addEventListener('click', () => {
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    });
  </script>

</body>
</html>
